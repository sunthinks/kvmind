absolute_redirect off;

index index.html;

# Security headers
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# KVM device basic auth — placeholder, injected by install.sh from config.yaml
set $kvm_device_auth "Basic YWRtaW46YWRtaW4=";

auth_request /auth_check;
error_page 401 = @login;

location = /auth_check {
	internal;
	proxy_pass http://127.0.0.1:8765/api/auth/check;
	proxy_pass_request_body off;
	proxy_set_header Content-Length "";
	proxy_set_header X-Original-URI $request_uri;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	auth_request off;
}

location = / {
	return 302 /kvm/;
}

location @login {
	return 302 /login;
}

location /login {
	return 301 /login/;
	auth_request off;
}

location = /favicon.ico {
	alias /opt/kvmind/kdkvm/web/static/favicon.svg;
	include /etc/kvmd/nginx/loc-nocache.conf;
	auth_request off;
}

location = /robots.txt {
	return 200 "User-agent: *\nDisallow: /api/\n";
	add_header Content-Type text/plain;
	auth_request off;
}

location /api/ws {
	rewrite ^/api/ws$ /ws break;
	rewrite ^/api/ws\?(.*)$ /ws?$1 break;
	proxy_pass http://kvmd;
	proxy_http_version 1.1;
	proxy_set_header Authorization $kvm_device_auth;
	include /etc/kvmd/nginx/loc-proxy.conf;
	include /etc/kvmd/nginx/loc-websocket.conf;
}

location /api/hid/print {
	rewrite ^/api/hid/print$ /hid/print break;
	rewrite ^/api/hid/print\?(.*)$ /hid/print?$1 break;
	proxy_pass http://kvmd;
	proxy_set_header Authorization $kvm_device_auth;
	include /etc/kvmd/nginx/loc-proxy.conf;
	include /etc/kvmd/nginx/loc-bigpost.conf;
}

location /api/msd/read {
	rewrite ^/api/msd/read$ /msd/read break;
	rewrite ^/api/msd/read\?(.*)$ /msd/read?$1 break;
	proxy_pass http://kvmd;
	proxy_set_header Authorization $kvm_device_auth;
	include /etc/kvmd/nginx/loc-proxy.conf;
	include /etc/kvmd/nginx/loc-nobuffering.conf;
	proxy_read_timeout 7d;
}

location /api/msd/write_remote {
	rewrite ^/api/msd/write_remote$ /msd/write_remote break;
	rewrite ^/api/msd/write_remote\?(.*)$ /msd/write_remote?$1 break;
	proxy_pass http://kvmd;
	proxy_set_header Authorization $kvm_device_auth;
	include /etc/kvmd/nginx/loc-proxy.conf;
	include /etc/kvmd/nginx/loc-nobuffering.conf;
	proxy_read_timeout 7d;
}

location /api/msd/write {
	rewrite ^/api/msd/write$ /msd/write break;
	rewrite ^/api/msd/write\?(.*)$ /msd/write?$1 break;
	proxy_pass http://kvmd;
	proxy_set_header Authorization $kvm_device_auth;
	include /etc/kvmd/nginx/loc-proxy.conf;
	include /etc/kvmd/nginx/loc-bigpost.conf;
}

location /api/log {
	rewrite ^/api/log$ /log break;
	rewrite ^/api/log\?(.*)$ /log?$1 break;
	proxy_pass http://kvmd;
	proxy_set_header Authorization $kvm_device_auth;
	include /etc/kvmd/nginx/loc-proxy.conf;
	include /etc/kvmd/nginx/loc-nobuffering.conf;
	proxy_read_timeout 7d;
}

location /api {
	rewrite ^/api$ / break;
	rewrite ^/api/(.*)$ /$1 break;
	proxy_pass http://kvmd;
	proxy_set_header Authorization $kvm_device_auth;
	include /etc/kvmd/nginx/loc-proxy.conf;
}

location /streamer {
	rewrite ^/streamer$ / break;
	rewrite ^/streamer\?(.*)$ ?$1 break;
	rewrite ^/streamer/(.*)$ /$1 break;
	proxy_pass http://ustreamer;
	include /etc/kvmd/nginx/loc-proxy.conf;
	include /etc/kvmd/nginx/loc-nobuffering.conf;
}

location /redfish {
	proxy_pass http://kvmd;
	proxy_set_header Authorization $kvm_device_auth;
	include /etc/kvmd/nginx/loc-proxy.conf;
}

# ── KVM Media proxy (H.264 WebSocket stream) ─────────────────
location /api/media/ws {
	rewrite ^/api/media/ws$ /ws break;
	rewrite ^/api/media/ws\?(.*)$ /ws?$1 break;
	proxy_pass http://media;
	include /etc/kvmd/nginx/loc-proxy.conf;
	include /etc/kvmd/nginx/loc-websocket.conf;
}

location /api/media {
	rewrite ^/api/media$ / break;
	rewrite ^/api/media\?(.*)$ /?$1 break;
	proxy_pass http://media;
	include /etc/kvmd/nginx/loc-proxy.conf;
}

# ── KVM Janus WebRTC gateway ──────────────────────────────────
location /api/janus/ws {
	rewrite ^/api/janus/ws$ / break;
	proxy_pass http://janus-ws;
	include /etc/kvmd/nginx/loc-proxy.conf;
	include /etc/kvmd/nginx/loc-websocket.conf;
}

# ── KVM shared static assets (SVG, images) ───────────────────
location /share/ {
	alias /usr/share/kvmd/web/share/;
	auth_request off;
}

# ── KVMind Dashboard ──────────────────────────────────────────
location /dashboard/ {
	alias /opt/kvmind/kdkvm/web/;
	try_files /dashboard.html =404;
	include /etc/kvmd/nginx/loc-nocache.conf;
}

# ── KVMind Console (main UI) ──────────────────────────────────
location /kvm/ {
	alias /opt/kvmind/kdkvm/web/;
	try_files /index.html =404;
	include /etc/kvmd/nginx/loc-nocache.conf;
}

# ── KVMind Login page ──────────────────────────────────────────

location /login/ {
	alias /opt/kvmind/kdkvm/web/;
	try_files /login.html =404;
	add_header Cache-Control "no-cache";
	auth_request off;
}

location = /kdkvm/login.html {
	alias /opt/kvmind/kdkvm/web/login.html;
	add_header Cache-Control "no-cache";
	auth_request off;
}

# ── KVMind Change Password page ───────────────────────────────
location = /change-password.html {
	alias /opt/kvmind/kdkvm/web/change-password.html;
	add_header Cache-Control "no-cache";
	auth_request off;
}

# ── KVMind Setup page (LAN only, block Cloudflare Tunnel) ─────
location = /setup.html {
	allow 192.168.0.0/16;
	allow 10.0.0.0/8;
	allow 172.16.0.0/12;
	deny all;
	alias /opt/kvmind/kdkvm/web/setup.html;
	add_header Cache-Control "no-cache";
	auth_request off;
}

# ── KVMind Bridge API & WebSocket ─────────────────────────────
# 把 KVMind bridge 挂在 /kdkvm/ 路径
location /kdkvm/ws/ {
	proxy_pass http://127.0.0.1:8765/ws/;
	proxy_http_version 1.1;
	proxy_set_header Upgrade $http_upgrade;
	proxy_set_header Connection "upgrade";
	proxy_set_header Host $host;
	proxy_read_timeout 3600s;
}

# kvmind device API (no /kdkvm prefix)
location /api/device/ {
	proxy_pass http://127.0.0.1:8765/api/device/;
	proxy_http_version 1.1;
	proxy_set_header Host $host;
	auth_request off;
}

# Block internal-only endpoints from external access
location = /kdkvm/api/subscription/sync {
	return 403;
}

# Setup API — LAN only (same restriction as setup.html)
location = /kdkvm/api/setup/complete {
	allow 192.168.0.0/16;
	allow 10.0.0.0/8;
	allow 172.16.0.0/12;
	deny all;
	proxy_pass http://127.0.0.1:8765/api/setup/complete;
	proxy_http_version 1.1;
	proxy_set_header Host $host;
	auth_request off;
}

location /kdkvm/api/ {
	proxy_pass http://127.0.0.1:8765/api/;
	proxy_http_version 1.1;
	proxy_set_header Host $host;
	auth_request off;
}

location = /kdkvm/ {
	return 302 /kvm/;
}

# (ZeroClaw routes removed — AI chat now handled by InnerClaw via KVMind Bridge)

# KVMind static assets — served directly, no kvmd auth
location ~ ^/kdkvm/(.*\.(js|css|json))$ {
	alias /opt/kvmind/kdkvm/web/$1;
	add_header Cache-Control "no-cache";
	auth_request off;
}
