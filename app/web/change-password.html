<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KVMind — 修改密码</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%276%27 fill=%27%230f1923%27/%3E%3Cpath d=%27M18 4L8 18h6l-2 10 10-14h-6z%27 fill=%27%233ecf8e%27/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;overflow:hidden;background:#111d2e;display:flex;align-items:center;justify-content:center;padding:24px}

.card{width:100%;max-width:440px;background:#152535;border:1px solid #2a3a4a;border-radius:16px;padding:40px;box-shadow:0 24px 64px rgba(0,0,0,0.4)}

.card-icon{width:56px;height:56px;border-radius:14px;background:rgba(62,207,142,0.1);border:1px solid rgba(62,207,142,0.2);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px}

.card-title{font-size:22px;font-weight:700;color:#e8edf3;margin-bottom:8px}
.card-desc{font-size:14px;color:#5a6a7a;margin-bottom:28px;line-height:1.6}

/* Language switcher */
.lang-group{position:absolute;top:20px;right:24px;display:flex;gap:4px;z-index:2}
.lang-btn{padding:6px 12px;border:1px solid #2a3a4a;border-radius:6px;background:#1a2332;color:#5a6a7a;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.lang-btn:hover{border-color:#3ecf8e;color:#a0f0d0}
.lang-btn.active{background:#3ecf8e;color:#0f1923;border-color:#3ecf8e;font-weight:600}

/* Error / Success */
.msg{display:none;padding:10px 14px;margin-bottom:16px;border-radius:8px;font-size:13px}
.msg.error{background:rgba(239,83,80,0.1);border:1px solid rgba(239,83,80,0.25);color:#ef5350;animation:shake .4s ease}
.msg.success{background:rgba(62,207,142,0.1);border:1px solid rgba(62,207,142,0.25);color:#3ecf8e}
.msg.show{display:block}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Inputs */
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:500;color:#7a8a9a;margin-bottom:6px}
.field input{width:100%;padding:12px 16px;border-radius:8px;border:1px solid #2a3a4a;background:#1a2332;color:#e8edf3;font-size:14px;outline:none;transition:border-color .3s;font-family:inherit}
.field input:focus{border-color:#3ecf8e}
.field input::placeholder{color:#5a6a7a}

/* Password strength */
.pw-strength{height:3px;border-radius:2px;background:#2a3a4a;margin-top:6px;overflow:hidden}
.pw-strength-bar{height:100%;width:0;border-radius:2px;transition:width .3s,background .3s}
.pw-hint{font-size:11px;color:#5a6a7a;margin-top:4px}

/* Button */
.submit-btn{width:100%;padding:13px;border:none;border-radius:8px;background:linear-gradient(135deg,#3ecf8e,#2bb77a);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;font-family:inherit;margin-top:8px}
.submit-btn:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 16px rgba(62,207,142,0.3)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;filter:none}
.cancel-btn{width:100%;padding:12px;border:1px solid #2a3a4a;border-radius:8px;background:transparent;color:#7a8a9a;font-size:14px;font-weight:500;cursor:pointer;transition:all .3s;font-family:inherit;margin-top:8px}
.cancel-btn:hover{border-color:#5a6a7a;color:#e8edf3;background:#1a2332}

/* Responsive */
@media(max-width:480px){
  .card{padding:28px 24px}
  .card-title{font-size:18px}
}
</style>
</head>
<body>

<div class="lang-group">
  <button class="lang-btn active" onclick="setLang('zh')">中文</button>
  <button class="lang-btn" onclick="setLang('ja')">日本語</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<div class="card">
  <div class="card-icon">🔐</div>
  <h2 class="card-title" data-i18n="title">修改设备密码</h2>
  <p class="card-desc" data-i18n="desc">首次登录需要修改默认密码。新密码至少8个字符。</p>

  <div id="msg" class="msg"></div>

  <div class="field">
    <label data-i18n="label_current">当前密码</label>
    <input type="password" id="input-old" data-i18n-ph="ph_current" placeholder="输入当前密码" autocomplete="current-password">
  </div>

  <div class="field">
    <label data-i18n="label_new">新密码</label>
    <input type="password" id="input-new" data-i18n-ph="ph_new" placeholder="至少8个字符" autocomplete="new-password" oninput="checkStrength()">
    <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar"></div></div>
    <div class="pw-hint" id="pw-hint" data-i18n="pw_hint_none"></div>
  </div>

  <div class="field">
    <label data-i18n="label_confirm">确认新密码</label>
    <input type="password" id="input-confirm" data-i18n-ph="ph_confirm" placeholder="再次输入新密码" autocomplete="new-password"
           onkeydown="if(event.key==='Enter')doChange()">
  </div>

  <button class="submit-btn" id="btn-submit" onclick="doChange()" data-i18n="btn_change">修改密码</button>
  <button class="cancel-btn" onclick="history.back()" data-i18n="btn_cancel">取消</button>
</div>

<script>
var L={
zh:{title:"修改设备密码",desc:"首次登录需要修改默认密码。新密码至少8个字符。",label_current:"当前密码",ph_current:"输入当前密码",label_new:"新密码",ph_new:"至少8个字符",label_confirm:"确认新密码",ph_confirm:"再次输入新密码",btn_change:"修改密码",btn_changing:"修改中...",pw_hint_weak:"弱 — 建议使用更长的密码",pw_hint_medium:"中等",pw_hint_strong:"强",pw_hint_none:"",err_old:"请输入当前密码",err_new_short:"新密码至少8个字符",err_mismatch:"两次输入的密码不一致",err_same:"新密码不能与当前密码相同",err_net:"网络错误",success:"密码已修改，正在跳转...",btn_cancel:"取消"},
ja:{title:"デバイスパスワード変更",desc:"初回ログイン時はデフォルトパスワードの変更が必要です。8文字以上で設定してください。",label_current:"現在のパスワード",ph_current:"現在のパスワードを入力",label_new:"新しいパスワード",ph_new:"8文字以上",label_confirm:"新しいパスワード（確認）",ph_confirm:"もう一度入力",btn_change:"パスワード変更",btn_changing:"変更中...",pw_hint_weak:"弱い — より長いパスワードを推奨",pw_hint_medium:"普通",pw_hint_strong:"強い",pw_hint_none:"",err_old:"現在のパスワードを入力してください",err_new_short:"新しいパスワードは8文字以上",err_mismatch:"パスワードが一致しません",err_same:"新しいパスワードは現在と異なる必要があります",err_net:"ネットワークエラー",success:"パスワードが変更されました。リダイレクト中...",btn_cancel:"キャンセル"},
en:{title:"Change Device Password",desc:"First login requires changing the default password. New password must be at least 8 characters.",label_current:"Current Password",ph_current:"Enter current password",label_new:"New Password",ph_new:"At least 8 characters",label_confirm:"Confirm New Password",ph_confirm:"Enter new password again",btn_change:"Change Password",btn_changing:"Changing...",pw_hint_weak:"Weak \u2014 use a longer password",pw_hint_medium:"Medium",pw_hint_strong:"Strong",pw_hint_none:"",err_old:"Please enter current password",err_new_short:"New password must be at least 8 characters",err_mismatch:"Passwords do not match",err_same:"New password must differ from current",err_net:"Network error",success:"Password changed. Redirecting...",btn_cancel:"Cancel"}
};
var _l='zh';
function t(k){return L[_l]?.[k]||k}

function setLang(v){
  _l=v;localStorage.setItem('kvmind_lang',v);
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var k=el.getAttribute('data-i18n'),s=L[v]?.[k];
    if(s)el.textContent=s;
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(function(el){
    var k=el.getAttribute('data-i18n-ph'),s=L[v]?.[k];
    if(s)el.placeholder=s;
  });
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.classList.toggle('active',b.textContent.trim()==={zh:'中文',ja:'日本語',en:'EN'}[v]);
  });
  checkStrength();
}

function showMsg(text,type){
  var el=document.getElementById('msg');
  el.textContent=text;
  el.className='msg '+type+' show';
}

function checkStrength(){
  var pw=document.getElementById('input-new').value;
  var bar=document.getElementById('pw-bar');
  var hint=document.getElementById('pw-hint');
  if(!pw){bar.style.width='0';hint.textContent='';return}
  var score=0;
  if(pw.length>=8)score++;
  if(pw.length>=12)score++;
  if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))score++;
  if(/\d/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;

  if(score<=2){
    bar.style.width='33%';bar.style.background='#ef5350';
    hint.textContent=t('pw_hint_weak');hint.style.color='#ef5350';
  }else if(score<=3){
    bar.style.width='66%';bar.style.background='#d29922';
    hint.textContent=t('pw_hint_medium');hint.style.color='#d29922';
  }else{
    bar.style.width='100%';bar.style.background='#3ecf8e';
    hint.textContent=t('pw_hint_strong');hint.style.color='#3ecf8e';
  }
}

async function doChange(){
  document.getElementById('msg').className='msg';
  var oldPw=document.getElementById('input-old').value;
  var newPw=document.getElementById('input-new').value;
  var confirm=document.getElementById('input-confirm').value;

  if(!oldPw){showMsg(t('err_old'),'error');return}
  if(newPw.length<8){showMsg(t('err_new_short'),'error');return}
  if(newPw!==confirm){showMsg(t('err_mismatch'),'error');return}
  if(newPw===oldPw){showMsg(t('err_same'),'error');return}

  var btn=document.getElementById('btn-submit');
  btn.disabled=true;
  btn.textContent=t('btn_changing');

  try{
    var r=await fetch('/kdkvm/api/auth/change-password',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({old_password:oldPw,new_password:newPw})
    });
    var d=await r.json();
    if(r.ok&&d.status==='ok'){
      showMsg(t('success'),'success');
      setTimeout(function(){window.location.href='/'},1500);
    }else{
      console.error('Change password error:', d.error);
      showMsg(t('err_net'),'error');
      btn.disabled=false;
      btn.textContent=t('btn_change');
    }
  }catch(e){
    showMsg(t('err_net'),'error');
    btn.disabled=false;
    btn.textContent=t('btn_change');
  }
}

window.addEventListener('DOMContentLoaded',function(){
  var saved=localStorage.getItem('kvmind_lang');
  var nav=(navigator.language||'').toLowerCase();
  setLang(saved||(nav.startsWith('zh')?'zh':nav.startsWith('ja')?'ja':'en'));
});
</script>
</body>
</html>
